<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 820" role="img" aria-labelledby="title desc">
  <title id="title">Graphsmith architecture pipeline</title>
  <desc id="desc">A flow diagram showing goal policy and decomposition, candidate retrieval, LLM IR candidates, deterministic ranking, compilation and normalization, validation and repair, execution, traces, promotion, runtime repair, and closed-loop skill generation.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
    <linearGradient id="goalGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="detGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ecfccb"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="traceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <style>
      .title { font: 700 26px 'Segoe UI', system-ui, sans-serif; fill: #0f172a; }
      .box-title { font: 700 18px 'Segoe UI', system-ui, sans-serif; fill: #0f172a; }
      .box-sub { font: 400 13px 'Segoe UI', system-ui, sans-serif; fill: #475569; }
      .side { font: 700 13px 'Segoe UI', system-ui, sans-serif; fill: #475569; letter-spacing: 0.08em; }
      .line { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="560" y="42" text-anchor="middle" class="title">Graphsmith Planning and Execution Pipeline</text>

  <rect x="402" y="70" width="316" height="58" rx="16" fill="url(#goalGrad)" stroke="#3b82f6" stroke-width="2"/>
  <text x="560" y="104" text-anchor="middle" class="box-title">Goal</text>

  <rect x="64" y="160" width="120" height="300" rx="18" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="124" y="312" text-anchor="middle" class="side" transform="rotate(-90 124 312)">MODEL-DRIVEN</text>

  <rect x="222" y="156" width="676" height="74" rx="18" fill="url(#llmGrad)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="560" y="186" text-anchor="middle" class="box-title">Goal Policy and Deterministic Decomposition</text>
  <text x="560" y="208" text-anchor="middle" class="box-sub">derive constraints, coarse transforms, and presentation intent</text>

  <rect x="222" y="266" width="676" height="74" rx="18" fill="#eff6ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="560" y="296" text-anchor="middle" class="box-title">Candidate Retrieval</text>
  <text x="560" y="318" text-anchor="middle" class="box-sub">search local and remote skill registries with provenance-aware metadata</text>

  <rect x="222" y="376" width="676" height="74" rx="18" fill="url(#llmGrad)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="560" y="406" text-anchor="middle" class="box-title">LLM IR Candidates</text>
  <text x="560" y="428" text-anchor="middle" class="box-sub">typed semantic plans with steps, bindings, loops, and guarded regions</text>

  <rect x="936" y="156" width="120" height="374" rx="18" fill="#ecfeff" stroke="#bae6fd"/>
  <text x="996" y="344" text-anchor="middle" class="side" transform="rotate(90 996 344)">DETERMINISTIC GRAPHSMITH</text>

  <rect x="222" y="486" width="676" height="74" rx="18" fill="url(#detGrad)" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="516" text-anchor="middle" class="box-title">Deterministic Ranking and Selection</text>
  <text x="560" y="538" text-anchor="middle" class="box-sub">semantic scoring, policy checks, and exact-capability grounding</text>

  <rect x="222" y="596" width="320" height="74" rx="18" fill="#fdf2f8" stroke="#ec4899" stroke-width="2"/>
  <text x="382" y="626" text-anchor="middle" class="box-title">IR Compile and Normalize</text>
  <text x="382" y="648" text-anchor="middle" class="box-sub">lower to executable graph structure</text>

  <rect x="578" y="596" width="320" height="74" rx="18" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="738" y="626" text-anchor="middle" class="box-title">Validate, Repair, Execute</text>
  <text x="738" y="648" text-anchor="middle" class="box-sub">guards, loop bodies, traces, and local region repair</text>

  <rect x="578" y="706" width="320" height="74" rx="18" fill="url(#traceGrad)" stroke="#f59e0b" stroke-width="2"/>
  <text x="738" y="736" text-anchor="middle" class="box-title">Trace, Promote, and Synthesize</text>
  <text x="738" y="758" text-anchor="middle" class="box-sub">promotion signals and closed-loop skill generation</text>

  <line x1="560" y1="128" x2="560" y2="156" class="line"/>
  <line x1="560" y1="230" x2="560" y2="266" class="line"/>
  <line x1="560" y1="340" x2="560" y2="376" class="line"/>
  <line x1="560" y1="450" x2="560" y2="486" class="line"/>
  <line x1="542" y1="560" x2="414" y2="596" class="line"/>
  <line x1="578" y1="560" x2="706" y2="596" class="line"/>
  <line x1="542" y1="633" x2="578" y2="633" class="line"/>
  <line x1="738" y1="670" x2="738" y2="706" class="line"/>
  <path d="M 578 743 C 420 743, 180 743, 180 413 C 180 308, 202 308, 222 308" class="line"/>
</svg>
