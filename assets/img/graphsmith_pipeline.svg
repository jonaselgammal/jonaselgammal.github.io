<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#6b7280" stroke-width="1.2"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="none"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#374151" letter-spacing="0.5">Graphsmith Planning Pipeline</text>

  <!-- Boxes -->
  <!-- Goal -->
  <rect x="230" y="50" width="220" height="42" rx="8" fill="url(#headerGrad)" stroke="#3b82f6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="340" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Natural Language Goal</text>

  <!-- Arrow 1 -->
  <line x1="340" y1="92" x2="340" y2="118" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Decomposition -->
  <rect x="200" y="120" width="280" height="52" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="340" y="143" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6d28d9">Semantic Decomposition</text>
  <text x="340" y="161" text-anchor="middle" font-size="10" fill="#7c3aed" opacity="0.8">content transforms + presentation intent</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="172" x2="340" y2="198" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- LLM label -->
  <rect x="16" y="120" width="56" height="150" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.8" opacity="0.6"/>
  <text x="44" y="200" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="600" transform="rotate(-90, 44, 200)">LLM (semantic)</text>

  <!-- IR Candidates -->
  <rect x="200" y="200" width="280" height="52" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="340" y="223" text-anchor="middle" font-size="12.5" font-weight="600" fill="#15803d">IR Candidate Generation</text>
  <text x="340" y="241" text-anchor="middle" font-size="10" fill="#16a34a" opacity="0.8">N independent semantic plans</text>

  <!-- Arrow 3 -->
  <line x1="340" y1="252" x2="340" y2="278" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Deterministic label -->
  <rect x="608" y="278" width="56" height="190" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
  <text x="636" y="378" text-anchor="middle" font-size="9" fill="#b45309" font-weight="600" transform="rotate(90, 636, 378)">Deterministic (Graphsmith)</text>

  <!-- Scoring -->
  <rect x="200" y="280" width="280" height="52" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="340" y="303" text-anchor="middle" font-size="12.5" font-weight="600" fill="#b45309">Scoring + Reranking</text>
  <text x="340" y="321" text-anchor="middle" font-size="10" fill="#d97706" opacity="0.8">deterministic semantic scorer selects best</text>

  <!-- Arrow 4 -->
  <line x1="340" y1="332" x2="340" y2="358" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Compiler -->
  <rect x="200" y="360" width="280" height="52" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="340" y="383" text-anchor="middle" font-size="12.5" font-weight="600" fill="#be123c">Deterministic Compiler</text>
  <text x="340" y="401" text-anchor="middle" font-size="10" fill="#e11d48" opacity="0.8">IR &rarr; edges, nodes, outputs, validation</text>

  <!-- Arrow 5 -->
  <line x1="340" y1="412" x2="340" y2="438" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Validated Graph -->
  <rect x="200" y="440" width="280" height="52" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="340" y="463" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0369a1">Validated Executable Graph</text>
  <text x="340" y="481" text-anchor="middle" font-size="10" fill="#0284c7" opacity="0.8">structurally guaranteed correct</text>
</svg>
